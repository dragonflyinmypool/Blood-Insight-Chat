openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Blood Test Tracker API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: blood-tests
    description: Blood test upload and management
  - name: chat
    description: AI chat about blood test results
  - name: openai
    description: OpenAI AI chat operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /blood-tests:
    get:
      operationId: listBloodTests
      tags: [blood-tests]
      summary: List all blood tests
      responses:
        "200":
          description: List of blood tests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BloodTest"
    post:
      operationId: uploadBloodTest
      tags: [blood-tests]
      summary: Upload a blood test PDF and extract results
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadBloodTestBody"
      responses:
        "201":
          description: Blood test created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BloodTestWithResults"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /blood-tests/{id}:
    get:
      operationId: getBloodTest
      tags: [blood-tests]
      summary: Get a blood test with all results
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Blood test with results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BloodTestWithResults"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    delete:
      operationId: deleteBloodTest
      tags: [blood-tests]
      summary: Delete a blood test
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /blood-tests/summary:
    get:
      operationId: getBloodTestSummary
      tags: [blood-tests]
      summary: Get summary stats across all blood tests
      responses:
        "200":
          description: Summary statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BloodTestSummary"

  /blood-tests/markers:
    get:
      operationId: listMarkerHistory
      tags: [blood-tests]
      summary: Get history of a specific marker across all tests
      parameters:
        - name: markerName
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Marker history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MarkerHistory"

  /chat/conversations:
    get:
      operationId: listChatConversations
      tags: [chat]
      summary: List all chat conversations
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChatConversation"
    post:
      operationId: createChatConversation
      tags: [chat]
      summary: Create a new chat conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateChatConversationBody"
      responses:
        "201":
          description: Created conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatConversation"

  /chat/conversations/{id}:
    get:
      operationId: getChatConversation
      tags: [chat]
      summary: Get conversation with messages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatConversationWithMessages"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    delete:
      operationId: deleteChatConversation
      tags: [chat]
      summary: Delete a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /chat/conversations/{id}/messages:
    get:
      operationId: listChatMessages
      tags: [chat]
      summary: List messages in a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChatMessage"
    post:
      operationId: sendChatMessage
      tags: [chat]
      summary: Send a message and get a streaming AI response
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendChatMessageBody"
      responses:
        "200":
          description: SSE stream of assistant response
          content:
            text/event-stream: {}

  /openai/conversations:
    get:
      operationId: listOpenaiConversations
      tags: [openai]
      summary: List all conversations
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OpenaiConversation"
    post:
      operationId: createOpenaiConversation
      tags: [openai]
      summary: Create a new conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOpenaiConversationBody"
      responses:
        "201":
          description: Created conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiConversation"
  /openai/conversations/{id}:
    get:
      operationId: getOpenaiConversation
      tags: [openai]
      summary: Get conversation with messages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiConversationWithMessages"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiError"
    delete:
      operationId: deleteOpenaiConversation
      tags: [openai]
      summary: Delete a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiError"
  /openai/conversations/{id}/messages:
    get:
      operationId: listOpenaiMessages
      tags: [openai]
      summary: List messages in a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OpenaiMessage"
    post:
      operationId: sendOpenaiMessage
      tags: [openai]
      summary: Send a text message and receive a streaming text response
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendOpenaiMessageBody"
      responses:
        "200":
          description: SSE stream of assistant text chunks
          content:
            text/event-stream: {}
  /openai/conversations/{id}/voice-messages:
    post:
      operationId: sendOpenaiVoiceMessage
      tags: [openai]
      summary: Send audio and receive a streaming voice response
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendOpenaiVoiceMessageBody"
      responses:
        "200":
          description: SSE stream of transcript and audio chunks
          content:
            text/event-stream: {}
  /openai/generate-image:
    post:
      operationId: generateOpenaiImage
      tags: [openai]
      summary: Generate an image from a text prompt
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateOpenaiImageBody"
      responses:
        "200":
          description: Generated image data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateOpenaiImageResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    BloodTest:
      type: object
      properties:
        id:
          type: integer
        fileName:
          type: string
        testDate:
          type: ["string", "null"]
        labName:
          type: ["string", "null"]
        patientName:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        resultCount:
          type: integer
      required:
        - id
        - fileName
        - testDate
        - labName
        - patientName
        - notes
        - createdAt
        - resultCount

    BloodTestResult:
      type: object
      properties:
        id:
          type: integer
        bloodTestId:
          type: integer
        markerName:
          type: string
        value:
          type: ["number", "null"]
        unit:
          type: ["string", "null"]
        referenceRangeLow:
          type: ["number", "null"]
        referenceRangeHigh:
          type: ["number", "null"]
        status:
          type: ["string", "null"]
        rawText:
          type: ["string", "null"]
      required:
        - id
        - bloodTestId
        - markerName
        - value
        - unit
        - referenceRangeLow
        - referenceRangeHigh
        - status
        - rawText

    BloodTestWithResults:
      type: object
      properties:
        id:
          type: integer
        fileName:
          type: string
        testDate:
          type: ["string", "null"]
        labName:
          type: ["string", "null"]
        patientName:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        results:
          type: array
          items:
            $ref: "#/components/schemas/BloodTestResult"
      required:
        - id
        - fileName
        - testDate
        - labName
        - patientName
        - notes
        - createdAt
        - results

    UploadBloodTestBody:
      type: object
      properties:
        fileName:
          type: string
        pdfBase64:
          type: string
        notes:
          type: ["string", "null"]
      required:
        - fileName
        - pdfBase64

    BloodTestSummary:
      type: object
      properties:
        totalTests:
          type: integer
        totalMarkers:
          type: integer
        abnormalCount:
          type: integer
        latestTestDate:
          type: ["string", "null"]
        commonMarkers:
          type: array
          items:
            type: string
      required:
        - totalTests
        - totalMarkers
        - abnormalCount
        - latestTestDate
        - commonMarkers

    MarkerHistory:
      type: object
      properties:
        markerName:
          type: string
        testDate:
          type: ["string", "null"]
        value:
          type: ["number", "null"]
        unit:
          type: ["string", "null"]
        status:
          type: ["string", "null"]
        referenceRangeLow:
          type: ["number", "null"]
        referenceRangeHigh:
          type: ["number", "null"]
        bloodTestId:
          type: integer
      required:
        - markerName
        - testDate
        - value
        - unit
        - status
        - referenceRangeLow
        - referenceRangeHigh
        - bloodTestId

    ChatConversation:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        bloodTestId:
          type: ["integer", "null"]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - bloodTestId
        - createdAt

    ChatConversationWithMessages:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        bloodTestId:
          type: ["integer", "null"]
        createdAt:
          type: string
          format: date-time
        messages:
          type: array
          items:
            $ref: "#/components/schemas/ChatMessage"
      required:
        - id
        - title
        - bloodTestId
        - createdAt
        - messages

    ChatMessage:
      type: object
      properties:
        id:
          type: integer
        conversationId:
          type: integer
        role:
          type: string
        content:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - conversationId
        - role
        - content
        - createdAt

    CreateChatConversationBody:
      type: object
      properties:
        title:
          type: string
        bloodTestId:
          type: ["integer", "null"]
      required:
        - title

    SendChatMessageBody:
      type: object
      properties:
        content:
          type: string
      required:
        - content

    ApiError:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    OpenaiConversation:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - createdAt
    OpenaiMessage:
      type: object
      properties:
        id:
          type: integer
        conversationId:
          type: integer
        role:
          type: string
        content:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - conversationId
        - role
        - content
        - createdAt
    CreateOpenaiConversationBody:
      type: object
      properties:
        title:
          type: string
      required:
        - title
    SendOpenaiMessageBody:
      type: object
      properties:
        content:
          type: string
      required:
        - content
    SendOpenaiVoiceMessageBody:
      type: object
      properties:
        audio:
          type: string
          description: Base64-encoded audio data
      required:
        - audio
    OpenaiConversationWithMessages:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          format: date-time
        messages:
          type: array
          items:
            $ref: "#/components/schemas/OpenaiMessage"
      required:
        - id
        - title
        - createdAt
        - messages
    GenerateOpenaiImageBody:
      type: object
      properties:
        prompt:
          type: string
        size:
          type: string
          enum: ["1024x1024", "512x512", "256x256"]
      required:
        - prompt
    GenerateOpenaiImageResponse:
      type: object
      properties:
        b64_json:
          type: string
      required:
        - b64_json
    OpenaiError:
      type: object
      properties:
        error:
          type: string
      required:
        - error
