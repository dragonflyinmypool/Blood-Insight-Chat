name: Deploy

# Manual trigger only. Pick an image that CI already built + pushed to GHCR,
# and a target environment. GitHub Environments let you attach per-env
# secrets (DB URLs, API keys) and required reviewers.

on:
  workflow_dispatch:
    inputs:
      image:
        description: "Image ref to deploy (e.g. ghcr.io/owner/repo:sha-abc123 or :latest)"
        required: true
        default: "ghcr.io/${{ github.repository }}:latest"
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - dev
          - prod

concurrency:
  group: deploy-${{ github.event.inputs.environment }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to ${{ github.event.inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    timeout-minutes: 15

