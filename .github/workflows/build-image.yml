name: Build Image

on:
  workflow_dispatch:

concurrency:
  group: build-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Typecheck + build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      NEXT_PUBLIC_SUPABASE_URL: http://localhost:54321
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-dummy-anon-key

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

  image:
    name: Docker image
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,format=long,prefix={{date 'YYYYMMDD-HHmmss'}}-sha-
            type=ref,event=branch
            type=ref,event=pr
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build + push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # NEXT_PUBLIC_* are baked at build time. CI uses dummies so the
          # image compiles; real values can be baked per-env by rebuilding
          # with the right --build-arg, or by switching to a runtime-config
          # approach (server actions / cookies) if you need one image across
          # environments.
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=http://localhost:54321
            NEXT_PUBLIC_SUPABASE_ANON_KEY=ci-dummy-anon-key

      - name: Summary
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          # Grab the date-and-sha tag that metadata-action produced.
          IMAGE=$(echo "$TAGS" | grep -- '-sha-' | head -1)
          {
            echo "## Image"
            echo ""
            echo '```'
            echo "$IMAGE"
            echo '```'
            echo ""
            echo "Paste this into the Deploy workflow's \`image\` input."
          } >> "$GITHUB_STEP_SUMMARY"
